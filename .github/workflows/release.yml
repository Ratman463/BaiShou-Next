name: Build & Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Android APK ──────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        run: pnpm sync:app-version

      - name: Prebuild Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > apps/mobile/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> apps/mobile/android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> apps/mobile/android/key.properties
          echo "storeFile=app/upload-keystore.jks" >> apps/mobile/android/key.properties

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  # ── Linux (Electron AppImage) ────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libnss3-dev libxss1 libasound2t64

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        run: pnpm sync:app-version

      - name: Build Linux AppImage
        run: pnpm --filter @baishou/desktop build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop/dist/*.AppImage

  # ── Windows (Inno Setup) ───────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        run: pnpm sync:app-version

      - name: Build Windows installer
        run: pnpm --filter @baishou/desktop build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist/BaiShou-v*-Windows-Setup.exe

  # ── GitHub Release ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Rename Android APK
        run: mv artifacts/app-release.apk "artifacts/BaiShou-${{ github.ref_name }}-Android.apk"

      - name: Rename Windows installer
        run: |
          installer=$(ls artifacts/BaiShou-v*-Windows-Setup.exe | head -n 1)
          mv "$installer" "artifacts/BaiShou-${{ github.ref_name }}-Windows-Setup.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 白守 ${{ github.ref_name }}
          body: |
            ## 白守 ${{ github.ref_name }}

            以纯白誓约，守护彼此一生。

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `-Android.apk` | 允许安装未知来源后安装，可覆盖旧 Flutter 版 |
            | Windows | `-Windows-Setup.exe` | Inno Setup 安装向导，默认 `Program Files\BaiShou` |
            | Linux | `.AppImage` | 添加可执行权限后运行 |

            ### 更新内容
            请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/BaiShou-${{ github.ref_name }}-Android.apk
            artifacts/BaiShou-${{ github.ref_name }}-Windows-Setup.exe
            artifacts/*.AppImage
          draft: false
          prerelease: false
